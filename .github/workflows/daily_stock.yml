name: Daily Stock Report

on:
  schedule:
      - cron: '0 14 * * 1-5' # 夏令(EDT) 10:00 AM ET = UTC 14:00
          - cron: '0 16 * * 1-5' # 夏令(EDT) 12:00 PM ET = UTC 16:00
              - cron: '0 20 * * 1-5' # 夏令(EDT) 04:00 PM ET = UTC 20:00
                  - cron: '0 15 * * 1-5' # 冬令(EST) 10:00 AM ET = UTC 15:00
                      - cron: '0 17 * * 1-5' # 冬令(EST) 12:00 PM ET = UTC 17:00
                          - cron: '0 21 * * 1-5' # 冬令(EST) 04:00 PM ET = UTC 21:00
                            workflow_dispatch:

                            permissions:
                              contents: write

                              jobs:
                                generate-and-deploy:
                                    runs-on: ubuntu-latest
                                        steps:
                                              - name: Checkout repo
                                                      uses: actions/checkout@v5

                                                            - name: Setup Python
                                                                    uses: actions/setup-python@v6
                                                                            with:
                                                                                      python-version: '3.11'

                                                                                            - name: Install dependencies
                                                                                                    run: pip install -r requirements.txt
                                                                                                    
                                                                                                          - name: Create output directory
                                                                                                                  run: mkdir -p output
                                                                                                                  
                                                                                                                        - name: Run stock scan
                                                                                                                                env:
                                                                                                                                          OUTPUT_DIR: ./output
                                                                                                                                                  run: python stock_scan.py
                                                                                                                                                  
                                                                                                                                                        - name: Deploy to GitHub Pages
                                                                                                                                                                uses: peaceiris/actions-gh-pages@v4
                                                                                                                                                                        with:
                                                                                                                                                                                  github_token: ${{ secrets.GITHUB_TOKEN }}
                                                                                                                                                                                            publish_dir: ./output
                                                                                                                                                                                                      keep_files: true
                                                                                                                                                                                                                commit_message: "update stock report"
